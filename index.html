<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anki Pro - Luyện Phát Âm & Điền Từ</title>
    <style>
        :root { --primary: #1a237e; --secondary: #5c6bc0; --success: #2e7d32; --danger: #c62828; --bg: #f4f6f9; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; background-color: var(--bg); margin: 0; padding: 20px; }
        h2 { color: var(--primary); margin-bottom: 15px; }

        /* Giao diện Hộp thẻ */
        .mode-switch { display: flex; gap: 10px; margin-bottom: 15px; background: white; padding: 10px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.05); }
        .btn-mode { padding: 10px 18px; border: none; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: bold; background-color: #e8eaf6; color: var(--secondary); transition: 0.3s; }
        .btn-mode.active { background-color: var(--primary); color: white; }

        .toolbar { display: flex; gap: 8px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; justify-content: center; }
        .btn-action { color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 13px; transition: 0.2s; }
        .speed-control { background: white; padding: 8px 12px; border-radius: 8px; font-size: 14px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        /* Hiệu ứng Thẻ */
        .card-container { perspective: 1200px; width: 420px; height: 500px; margin-bottom: 20px; cursor: pointer; }
        .card { width: 100%; height: 100%; position: relative; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .card.is-flipped { transform: rotateY(180deg); }
        
        .card-face { width: 100%; height: 100%; position: absolute; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 24px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); padding: 30px; box-sizing: border-box; text-align: center; overflow-y: auto; border: 1px solid rgba(0,0,0,0.03); }
        .card-front { background-color: white; color: #212121; }
        .card-back { background-color: #e8eaf6; color: var(--primary); transform: rotateY(180deg); }

        /* Media & Controls */
        .card-media img, .card-media video { max-width: 100%; max-height: 180px; border-radius: 12px; margin-top: 15px; }
        .audio-row { display: flex; gap: 15px; margin-top: 15px; align-items: center; }
        .btn-audio { background: white; border: 2px solid var(--primary); color: var(--primary); border-radius: 50%; width: 48px; height: 48px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .btn-audio:hover { background-color: var(--primary); color: white; }
        .btn-audio.active-loop { background-color: #ffeb3b; border-color: #fbc02d; color: #333; box-shadow: 0 0 10px #ffeb3b; }
        .btn-mic { border-color: #d32f2f; color: #d32f2f; }
        .btn-mic.recording { background-color: #d32f2f; color: white; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* Điền từ Cloze */
        .cloze-input { border: none; border-bottom: 3px solid var(--primary); font-size: 24px; text-align: center; width: 130px; outline: none; color: var(--primary); font-weight: bold; background: transparent; margin: 0 5px; }
        .cloze-correct { border-bottom-color: var(--success); color: var(--success); }
        .cloze-wrong { border-bottom-color: var(--danger); color: var(--danger); }

        /* Kết quả Check phát âm */
        #check-result { margin-top: 15px; font-size: 14px; padding: 10px; border-radius: 10px; width: 90%; display: none; font-weight: bold; text-align: center; }
        .res-correct { background: #e8f5e9; color: var(--success); border: 1px solid var(--success); }
        .res-wrong { background: #ffebee; color: var(--danger); border: 1px solid var(--danger); }

        /* Điều hướng & Form */
        .controls { display: none; margin-top: 10px; gap: 12px; width: 420px; }
        .controls.visible { display: flex; }
        .controls button { padding: 15px; border: none; border-radius: 12px; cursor: pointer; font-size: 16px; font-weight: bold; color: white; flex: 1; }
        .btn-next { background-color: #616161; }
        .btn-learned { background-color: var(--success); } 
        .btn-relearn { background-color: var(--danger); } 

        .box { margin-top: 25px; display: flex; flex-direction: column; gap: 10px; width: 420px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); box-sizing: border-box; }
        textarea { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; width: 100%; box-sizing: border-box; height: 70px; }
        .btn-add { background-color: #f57c00; padding: 12px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; font-size: 16px; }
        .status-badge { position: absolute; top: 15px; right: 15px; font-size: 12px; padding: 5px 10px; border-radius: 15px; background: #eee; color: #666; font-weight: bold; }
        .hint { font-size: 12px; color: #757575; text-align: center; margin-top: 5px; }
    </style>
</head>
<body>

    <h2>Anki Medical - Bản Thực Chiến</h2>
    
    <div class="mode-switch">
        <button id="tab-learning" class="btn-mode active" onclick="switchMode('learning')">Đang học (<span id="count-learning">0</span>)</button>
        <button id="tab-learned" class="btn-mode" onclick="switchMode('learned')">Đã thuộc (<span id="count-learned">0</span>)</button>
    </div>

    <div class="toolbar">
        <div class="speed-control">Tốc độ: 
            <select id="speed-selector" onchange="applySpeed()">
                <option value="0.8">0.8x</option>
                <option value="1" selected>1.0x</option>
                <option value="1.2">1.2x</option>
            </select>
        </div>
        <button class="btn-action" style="background:#7b1fa2" onclick="shuffleDeck()">🔀 Xáo bài</button>
        <button class="btn-action" style="background:#00897b" onclick="exportData()">⬇ Xuất file</button>
        <button class="btn-action" style="background:#e65100" onclick="document.getElementById('import-file').click()">⬆ Nhập file</button>
        <input type="file" id="import-file" accept=".json" style="display: none;" onchange="importData(event)">
    </div>
    
    <div class="card-container" onclick="flipCard(event)">
        <div class="card" id="flashcard">
            <div class="card-face card-front">
                <span class="status-badge">Câu hỏi</span>
                <div id="front-text">Bác sĩ hãy thêm thẻ mới!</div>
                
                <div id="check-result"></div>

                <div class="audio-row">
                    <button class="btn-audio btn-mic" id="btn-mic" onclick="startSpeechCheck(event)" title="Luyện nói (Phím V)">🎤</button>
                    <button class="btn-audio" onclick="playAudio(event, true)" title="Phát âm">🔊</button>
                    <button id="loop-btn" class="btn-audio" onclick="toggleLoop(event)" title="Lặp lại">🔁</button>
                </div>
                <div id="front-media" class="card-media"></div>
            </div>
            
            <div class="card-face card-back">
                <span class="status-badge">Giải nghĩa</span>
                <div id="back-text"></div>
                <div class="audio-row">
                    <button class="btn-audio" onclick="playAudio(event, false)" title="Phát âm">🔊</button>
                </div>
                <div id="back-media" class="card-media"></div>
            </div>
        </div>
    </div>

    <div class="controls" id="controls">
        <button class="btn-next" onclick="nextCard(event)">Tiếp theo ➔</button>
        <button id="btn-mark-learned" class="btn-learned" onclick="changeCardStatus('learned', event)">✔ Thuộc rồi</button>
        <button id="btn-mark-relearn" class="btn-relearn" style="display: none;" onclick="changeCardStatus('learning', event)">↺ Học lại</button>
    </div>

    <div class="action-row" style="display: flex; gap: 10px; width: 420px; margin-top: 15px;">
        <button onclick="editCard()" style="flex:1; padding: 8px; background:#0277bd; color:white; border:none; border-radius:8px; cursor:pointer;">✏️ Sửa</button>
        <button onclick="deleteCard()" style="flex:1; padding: 8px; background:#212121; color:white; border:none; border-radius:8px; cursor:pointer;">🗑 Xóa</button>
    </div>

    <div class="box" id="form-box">
        <h3 id="form-title" style="margin: 0; text-align: center; color: var(--primary);">Thêm thẻ mới</h3>
        <p class="hint">Dùng `[...]` để điền từ. VD: The patient has [stroke].</p>
        <textarea id="new-front-text" placeholder="Mặt trước (Tiếng Anh)..."></textarea>
        <input type="file" id="new-front-file" accept="image/*, audio/*, video/*">
        <textarea id="new-back-text" placeholder="Mặt sau (Tiếng Việt)..."></textarea>
        <input type="file" id="new-back-file" accept="image/*, audio/*, video/*">
        <button id="btn-submit" class="btn-add" onclick="saveCard()">Lưu thẻ</button>
        <button id="btn-cancel" onclick="cancelEdit()" style="display:none; width:100%; padding:8px; margin-top:5px; background:#999; color:white; border:none; border-radius:8px; cursor:pointer;">Hủy bỏ</button>
    </div>

    <script>
        let db; let allCards = []; let currentDeck = []; let currentIndex = 0; 
        let isFlipped = false; let currentMode = 'learning'; let editingId = null;
        let isLooping = false; let recognizer = null; let isRecording = false;

        // 1. TỰ ĐỘNG NHẬN DIỆN NGÔN NGỮ
        function getLang(text) {
            const viRegex = /[àáảãạăằắẳẵặâầấẩẫậèéẻẽẹêềếểễệđìíỉĩịòóỏõọôồốổỗộơờớởỡợùúủũụưừứửữựỳýỷỹỵ]/i;
            return viRegex.test(text) ? 'vi-VN' : 'en-US';
        }

        const request = indexedDB.open("MedicalFlashDB", 6);
        request.onupgradeneeded = e => {
            db = e.target.result;
            if (!db.objectStoreNames.contains("cards")) db.createObjectStore("cards", { keyPath: "id", autoIncrement: true });
        };
        request.onsuccess = e => { db = e.target.result; loadCards(); };

        function loadCards() {
            db.transaction(["cards"],"readonly").objectStore("cards").getAll().onsuccess = e => {
                allCards = e.target.result; filterDeck();
            };
        }

        function filterDeck() {
            currentDeck = currentMode === 'learning' ? allCards.filter(c => c.status !== 'learned') : allCards.filter(c => c.status === 'learned');
            document.getElementById('count-learning').innerText = allCards.filter(c => c.status !== 'learned').length;
            document.getElementById('count-learned').innerText = allCards.filter(c => c.status === 'learned').length;
            updateUI();
        }

        // 2. HIỆN THỊ & CLOZE
        function renderText(text) {
            if (!text) return "";
            return text.replace(/\[(.*?)\]/g, (match, p1) => 
                `<input type="text" class="cloze-input" data-ans="${p1}" onkeyup="checkCloze(this)" onclick="event.stopPropagation()" style="width:${p1.length*15 + 20}px">`
            );
        }

        function checkCloze(input) {
            const isCorrect = input.value.toLowerCase().trim() === input.dataset.ans.toLowerCase().trim();
            input.className = "cloze-input " + (input.value === "" ? "" : (isCorrect ? "cloze-correct" : "cloze-wrong"));
        }

        function updateUI() {
            const card = currentDeck[currentIndex];
            const frontText = document.getElementById('front-text');
            const backText = document.getElementById('back-text');
            document.getElementById('check-result').style.display = "none";

            if (!card) {
                frontText.innerText = "Hộp thẻ trống!"; backText.innerText = "";
                return;
            }

            frontText.innerHTML = renderText(card.frontText);
            backText.innerText = card.backText || "";
            
            const loadM = (file, id) => {
                const el = document.getElementById(id); el.innerHTML = "";
                if (!file) return;
                const url = URL.createObjectURL(file);
                if (file.type.startsWith('image')) el.innerHTML = `<img src="${url}">`;
                else if (file.type.startsWith('video')) el.innerHTML = `<video id="vid-${id}" controls src="${url}" class="media-el"></video>`;
                else if (file.type.startsWith('audio')) el.innerHTML = `<audio id="aud-${id}" controls src="${url}" class="media-el"></audio>`;
            };
            loadM(card.frontFile, 'front-media'); loadM(card.backFile, 'back-media');

            isFlipped = false;
            document.getElementById('flashcard').classList.remove('is-flipped');
            document.getElementById('controls').classList.remove('visible');
            stopMedia();
        }

        // 3. ÂM THANH & LẶP LẠI (FIXED)
        function toggleLoop(e) {
            e.stopPropagation();
            isLooping = !isLooping;
            e.target.classList.toggle('active-loop', isLooping);
        }

        function playAudio(e, isFront) {
            if (e) e.stopPropagation();
            stopMedia();
            const card = currentDeck[currentIndex];
            const file = isFront ? card.frontFile : card.backFile;
            const text = (isFront ? card.frontText : card.backText).replace(/\[|\]/g, "");
            const speed = parseFloat(document.getElementById('speed-selector').value);

            if (file && (file.type.startsWith('audio') || file.type.startsWith('video'))) {
                const mediaId = (file.type.startsWith('audio') ? 'aud-' : 'vid-') + (isFront ? 'front-media' : 'back-media');
                const mediaEl = document.getElementById(mediaId);
                if (mediaEl) {
                    mediaEl.playbackRate = speed;
                    mediaEl.loop = isLooping;
                    mediaEl.play();
                }
            } else if (text) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = getLang(text);
                utterance.rate = speed;
                utterance.onend = () => { if (isLooping) window.speechSynthesis.speak(utterance); };
                window.speechSynthesis.speak(utterance);
            }
        }

        function stopMedia() {
            window.speechSynthesis.cancel();
            document.querySelectorAll('.media-el').forEach(m => { m.pause(); m.currentTime = 0; });
        }

        // 4. LUYỆN NÓI (SPEAK CHECK)
        function startSpeechCheck(e) {
            e.stopPropagation();
            if (!('webkitSpeechRecognition' in window)) { alert("Trình duyệt không hỗ trợ micro."); return; }
            if (isRecording) { recognizer.stop(); return; }

            recognizer = new webkitSpeechRecognition();
            recognizer.lang = 'en-US';
            recognizer.onstart = () => { isRecording = true; document.getElementById('btn-mic').classList.add('recording'); };
            recognizer.onend = () => { isRecording = false; document.getElementById('btn-mic').classList.remove('recording'); };
            recognizer.onresult = event => {
                const spoken = event.results[0][0].transcript.toLowerCase().replace(/[.,!?]/g,"").trim();
                const card = currentDeck[currentIndex];
                const answer = card.frontText.toLowerCase().replace(/\[|\]/g,"").replace(/[.,!?]/g,"").trim();
                
                const res = document.getElementById('check-result');
                res.style.display = "block";
                if (spoken === answer) {
                    res.className = "res-correct"; res.innerText = "✓ Chuẩn xác!";
                } else {
                    res.className = "res-wrong"; res.innerText = "✗ Bạn nói: " + spoken;
                }
            };
            recognizer.start();
        }

        // 5. CÁC HÀM THAO TÁC (CRUD)
        function flipCard(e) {
            if (currentDeck.length === 0 || ['INPUT','VIDEO','AUDIO','BUTTON','SELECT'].includes(e.target.tagName)) return;
            isFlipped = !isFlipped;
            document.getElementById('flashcard').classList.toggle('is-flipped');
            setTimeout(() => document.getElementById('controls').classList.toggle('visible', isFlipped), 300);
        }

        function nextCard(e) { if(e) e.stopPropagation(); currentIndex = (currentIndex + 1) % currentDeck.length; updateUI(); }
        
        function saveCard() {
            const fT = document.getElementById('new-front-text').value;
            const bT = document.getElementById('new-back-text').value;
            const fF = document.getElementById('new-front-file').files[0];
            const bF = document.getElementById('new-back-file').files[0];
            const store = db.transaction(["cards"],"readwrite").objectStore("cards");

            if (editingId) {
                store.get(editingId).onsuccess = e => {
                    const old = e.target.result;
                    store.put({ id: editingId, frontText: fT, backText: bT, frontFile: fF || old.frontFile, backFile: bF || old.backFile, status: old.status });
                    cancelEdit(); loadCards();
                };
            } else {
                store.add({ frontText: fT, backText: bT, frontFile: fF, backFile: bF, status: 'learning' }).onsuccess = () => {
                    cancelEdit(); loadCards();
                };
            }
        }

        function editCard() {
            const c = currentDeck[currentIndex]; if(!c) return;
            editingId = c.id;
            document.getElementById('new-front-text').value = c.frontText;
            document.getElementById('new-back-text').value = c.backText;
            document.getElementById('form-title').innerText = "✏️ Đang sửa thẻ";
            document.getElementById('btn-cancel').style.display = "block";
            document.getElementById('form-box').scrollIntoView();
        }

        function cancelEdit() {
            editingId = null;
            document.getElementById('new-front-text').value = ""; document.getElementById('new-back-text').value = "";
            document.getElementById('form-title').innerText = "Thêm thẻ mới";
            document.getElementById('btn-cancel').style.display = "none";
        }

        function deleteCard() {
            if(!confirm("Xóa thẻ này?")) return;
            db.transaction(["cards"],"readwrite").objectStore("cards").delete(currentDeck[currentIndex].id).onsuccess = () => loadCards();
        }

        function switchMode(m) {
            currentMode = m; currentIndex = 0;
            document.getElementById('tab-learning').classList.toggle('active', m==='learning');
            document.getElementById('tab-learned').classList.toggle('active', m==='learned');
            filterDeck();
        }

        function changeCardStatus(st, e) {
            e.stopPropagation();
            const c = currentDeck[currentIndex]; c.status = st;
            db.transaction(["cards"],"readwrite").objectStore("cards").put(c).onsuccess = () => loadCards();
        }

        // PHÍM TẮT
        document.addEventListener('keydown', e => {
            if (['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)) return;
            if (e.code === 'Space') { e.preventDefault(); flipCard(e); }
            if (e.code === 'ArrowRight') { nextCard(e); }
            if (e.key.toLowerCase() === 'v') { startSpeechCheck(e); }
        });

        // XUẤT/NHẬP
        async function exportData() {
            const arr = [];
            for (let c of allCards) {
                const f2b = f => f ? new Promise(r => {const rd=new FileReader(); rd.onload=()=>r(rd.result); rd.readAsDataURL(f)}) : null;
                arr.push({t1:c.frontText, t2:c.backText, s:c.status, f1: await f2b(c.frontFile), f2: await f2b(c.backFile), m1:c.frontFile?.type, m2:c.backFile?.type});
            }
            const a = document.createElement('a'); a.href="data:text/json;charset=utf-8,"+encodeURIComponent(JSON.stringify(arr)); a.download="Medical_Anki.json"; a.click();
        }
        function importData(e) {
            const r = new FileReader();
            r.onload = evt => {
                const data = JSON.parse(evt.target.result);
                const store = db.transaction(["cards"],"readwrite").objectStore("cards");
                data.forEach(d => {
                    const b2b = (b, m) => { if(!b) return null; const bs=atob(b.split(',')[1]); let n=bs.length; const u=new Uint8Array(n); while(n--)u[n]=bs.charCodeAt(n); return new File([u], "media", {type:m}); };
                    store.add({frontText:d.t1, backText:d.t2, status:d.s, frontFile:b2b(d.f1, d.m1), backFile:b2b(d.f2, d.m2)});
                });
                store.transaction.oncomplete = () => loadCards();
            };
            r.readAsText(e.target.files[0]);
        }
    </script>
</body>
</html>
